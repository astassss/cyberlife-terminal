<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Life Terminal</title>

<style>

body{
margin:0;
background:#05080c;
font-family:monospace;
color:#00ff9c;
overflow:hidden;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(0,255,150,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,255,150,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* HEADER */

.header{
padding:15px;
border-bottom:1px solid #00ff9c;
color:#00ff9c;
text-shadow:0 0 8px #00ff9c;
letter-spacing:2px;
}

/* TERMINAL */

.terminal{
height:calc(100vh - 60px);
padding:20px;
overflow-y:auto;
font-size:14px;
}

/* TEXT GLOW */

.terminal div{
margin:2px 0;
text-shadow:0 0 6px #00ff9c;
}

/* CURSOR */

.cursor{
display:inline-block;
width:10px;
background:#00ff9c;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#00ff9c;
}

</style>
</head>

<body>

<div class="header">
CYBER LIFE SECURE TERMINAL v4.2
</div>

<div id="terminal" class="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

</body>
</html>
